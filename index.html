<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>霞浦八中七年16班 - 六一儿童节节目报名系统 | 向童年敬礼，向青春致意</title>
    <!-- 引入 JSZip 和 FileSaver 用于导出压缩包 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', 'Comic Neue', 'Poppins', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(145deg, #f9eec1 0%, #ffe6b3 100%);
            min-height: 100vh;
            padding: 30px 40px;
            position: relative;
            overflow-x: hidden;
        }

        /* 彩色纸屑飘落层 */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 12px;
            background: #ff4d4d;
            opacity: 0.8;
            animation: fall linear forwards;
            pointer-events: none;
        }

        @keyframes fall {
            0% {
                transform: translateY(-20vh) rotate(0deg);
                opacity: 1;
            }
            80% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* 主容器卡片 */
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(2px);
            border-radius: 56px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.35);
            overflow: hidden;
            border: 2px solid #ffcd7e;
            position: relative;
            z-index: 10;
        }

        /* 顶部导航栏 */
        .navbar {
            background: #ff9f4a;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #ffd966;
            flex-wrap: wrap;
        }

        .logo h1 {
            font-size: 1.8rem;
            color: #2d1b00;
            text-shadow: 2px 2px 0 #ffd966;
            letter-spacing: 2px;
        }

        .logo p {
            font-size: 0.85rem;
            color: #3e2a1f;
            font-weight: bold;
        }

        .user-area {
            background: #fff2db;
            padding: 8px 18px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
            color: #b45f1b;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .user-area:hover {
            background: #ffe0b5;
            transform: scale(0.98);
        }

        /* 主要内容区 */
        .main-content {
            padding: 30px 40px;
        }

        /* 警告声明 */
        .declaration {
            background: #fff1c1;
            border-left: 12px solid #ff6b6b;
            padding: 12px 20px;
            border-radius: 28px;
            margin-bottom: 30px;
            font-weight: bold;
            color: #a12a2a;
            font-size: 0.95rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* 表单卡片 */
        .form-card {
            background: #fef7e6;
            border-radius: 40px;
            padding: 24px 32px;
            margin-bottom: 40px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid #ffd89a;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group {
            flex: 1;
            min-width: 200px;
        }
        label {
            font-weight: 700;
            color: #b64900;
            display: block;
            margin-bottom: 6px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 40px;
            border: 1px solid #ffc489;
            background: white;
            font-size: 1rem;
            transition: 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #ff8c42;
            box-shadow: 0 0 0 3px rgba(255,140,66,0.2);
        }
        button {
            background: #ff9142;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        button:hover {
            background: #ff7629;
            transform: translateY(-2px);
        }
        .btn-danger {
            background: #e74c3c;
        }
        .btn-danger:hover {
            background: #c0392b;
        }
        .btn-success {
            background: #2ecc71;
        }
        .btn-info {
            background: #3498db;
        }

        /* 表格 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .data-table th, .data-table td {
            border-bottom: 1px solid #ffe0b5;
            padding: 14px 12px;
            text-align: left;
            vertical-align: middle;
        }
        .data-table th {
            background: #ffd966;
            color: #3c2a1f;
        }
        .badge {
            background: #f39c12;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            color: white;
            font-weight: bold;
        }
        .action-btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        .modal-card {
            background: white;
            border-radius: 48px;
            padding: 32px;
            width: 420px;
            max-width: 90%;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }
        .close-modal {
            float: right;
            font-size: 28px;
            cursor: pointer;
        }
        hr {
            margin: 15px 0;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .small-btn {
            padding: 5px 12px;
            font-size: 0.8rem;
        }
        footer {
            text-align: center;
            padding: 16px;
            font-size: 0.8rem;
            color: #a1662f;
        }
        @media (max-width: 780px) {
            body { padding: 15px; }
            .main-content { padding: 20px; }
        }
    </style>
</head>
<body>
<div class="confetti-container" id="confettiContainer"></div>

<div class="app-container">
    <div class="navbar">
        <div class="logo">
            <h1>🎈 向童年敬礼 · 向青春致意 🎈</h1>
            <p>霞浦县第八中学 ─ 七年16班 六一儿童节</p>
        </div>
        <div class="user-area" id="userStatusBtn">
            🔑 登录/注册
        </div>
    </div>
    <div class="main-content" id="appMainContent">
        <!-- 动态渲染: 普通用户报名界面 / 管理员界面 -->
    </div>
    <footer>⭐ 童心未泯，梦想继续 ⭐</footer>
</div>

<!-- 模态框: 登录/注册 -->
<div id="loginModal" class="modal">
    <div class="modal-card">
        <span class="close-modal" id="closeLoginModal">&times;</span>
        <h2>🎭 登录 / 注册</h2>
        <div id="loginTab">
            <input type="text" id="loginPhone" placeholder="手机号码" style="margin-bottom:12px;">
            <input type="password" id="loginPassword" placeholder="密码">
            <button id="doLoginBtn" style="margin-top:16px; width:100%">登录</button>
            <hr>
            <p style="text-align:center">新用户？注册账户自动登录</p>
            <button id="toRegisterBtn" style="background:#f1c40f; width:100%">注册新账号</button>
        </div>
        <div id="registerTab" style="display:none">
            <input type="text" id="regPhone" placeholder="手机号码">
            <input type="password" id="regPassword" placeholder="设置密码">
            <button id="doRegisterBtn" style="margin-top:16px; width:100%">立即注册并登录</button>
            <button id="backToLoginBtn" style="background:#95a5a6; margin-top:12px; width:100%">返回登录</button>
        </div>
    </div>
</div>

<!-- 管理员编辑报名弹窗 -->
<div id="editSubmissionModal" class="modal">
    <div class="modal-card" style="width:500px">
        <span class="close-modal" id="closeEditModal">&times;</span>
        <h3>✏️ 修改报名信息 (管理员)</h3>
        <input type="hidden" id="editId">
        <label>参演人姓名</label><input id="editPerformers">
        <label>节目名称</label><input id="editProgramName">
        <label>节目类型</label><input id="editProgramType">
        <label>背景音乐名</label><input id="editMusicName">
        <button id="saveEditBtn" style="margin-top:20px">保存修改</button>
    </div>
</div>

<!-- 管理员账号管理模态框 -->
<div id="accountManageModal" class="modal">
    <div class="modal-card" style="width:600px">
        <span class="close-modal" id="closeAccountModal">&times;</span>
        <h3>👥 所有普通用户账号</h3>
        <div id="accountListDiv" style="max-height:400px; overflow:auto;"></div>
    </div>
</div>

<script>
    // ---------- 存储 KEYS ----------
    const STORAGE_USERS = "class16_users";
    const STORAGE_SUBMISSIONS = "class16_submissions";
    const ADMIN_PHONE = "15960475828";
    const ADMIN_PWD = "lyx120921";

    // 当前登录用户信息 { phone, role }
    let currentUser = null;

    // 纸屑控制变量
    let confettiInterval = null;
    let isConfettiReduced = false;  // 登录后减少

    // 辅助函数: 获取存储数据
    function getUsers() {
        let users = localStorage.getItem(STORAGE_USERS);
        if(!users) {
            return [];
        }
        return JSON.parse(users);
    }

    function saveUsers(users) {
        localStorage.setItem(STORAGE_USERS, JSON.stringify(users));
    }

    function getSubmissions() {
        let subs = localStorage.getItem(STORAGE_SUBMISSIONS);
        if(!subs) return [];
        return JSON.parse(subs);
    }

    function saveSubmissions(subs) {
        localStorage.setItem(STORAGE_SUBMISSIONS, JSON.stringify(subs));
    }

    // 初始化默认数据
    function initData() {
        let users = getUsers();
        if(users.length === 0) {
            saveUsers([]);
        }
        let subs = getSubmissions();
        if(subs.length === 0) {
            saveSubmissions([]);
        }
    }

    // 彩色纸屑控制（根据是否登录调整密度）
    function startConfetti() {
        if (confettiInterval) clearInterval(confettiInterval);
        const container = document.getElementById('confettiContainer');
        // 根据当前是否登录决定生成间隔和数量
        const isLoggedIn = (currentUser !== null);
        let intervalMs, perBatch;
        if (isLoggedIn) {
            // 登录后：减少纸屑，间隔1.5秒，每次生成3个
            intervalMs = 1500;
            perBatch = 3;
        } else {
            // 未登录：密集飘落，间隔0.4秒，每次12个
            intervalMs = 400;
            perBatch = 12;
        }
        confettiInterval = setInterval(() => {
            for(let i=0; i<perBatch; i++) {
                const conf = document.createElement('div');
                conf.classList.add('confetti');
                const colors = ['#ff4d4d','#ff9f4a','#ffee66','#6bff6b','#ff66cc','#66ccff','#ffa07a'];
                conf.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
                conf.style.width = Math.random()*12+6+'px';
                conf.style.height = Math.random()*12+6+'px';
                conf.style.left = Math.random()*100+'%';
                conf.style.animationDuration = Math.random()*3+2.5+'s';
                conf.style.animationDelay = Math.random()*2+'s';
                container.appendChild(conf);
                setTimeout(()=>{ conf.remove(); }, 5000);
            }
        }, intervalMs);
    }

    // 当登录状态改变时，重新启动纸屑（更新密度）
    function updateConfettiDensity() {
        if (confettiInterval) {
            clearInterval(confettiInterval);
            confettiInterval = null;
        }
        startConfetti();
    }

    // 检查普通用户登录
    function loginUser(phone, pwd) {
        if(phone === ADMIN_PHONE && pwd === ADMIN_PWD) {
            currentUser = { phone: ADMIN_PHONE, role: 'admin' };
            updateConfettiDensity(); // 登录后调整纸屑密度
            return { success: true, role: 'admin' };
        }
        let users = getUsers();
        let user = users.find(u => u.phone === phone && u.password === pwd);
        if(user) {
            currentUser = { phone: user.phone, role: 'user' };
            updateConfettiDensity(); // 登录后调整纸屑密度
            return { success: true, role: 'user' };
        }
        return { success: false };
    }

    function registerUser(phone, pwd) {
        if(phone === ADMIN_PHONE) return { success: false, msg: '管理员账号不可注册' };
        let users = getUsers();
        if(users.find(u => u.phone === phone)) return { success: false, msg: '手机号已注册' };
        users.push({ phone: phone, password: pwd });
        saveUsers(users);
        currentUser = { phone: phone, role: 'user' };
        updateConfettiDensity(); // 登录后调整纸屑密度
        return { success: true };
    }

    function logout() {
        currentUser = null;
        updateConfettiDensity(); // 退出登录恢复密集纸屑
        renderApp();
    }

    // 普通用户删除自己的报名
    function deleteMySubmission(id) {
        let subs = getSubmissions();
        let sub = subs.find(s => s.id == id);
        if(sub && sub.userPhone === currentUser.phone) {
            let newSubs = subs.filter(s => s.id != id);
            saveSubmissions(newSubs);
            renderApp();
            return true;
        }
        return false;
    }

    // 管理员删除任何报名
    function adminDeleteSubmission(id) {
        let subs = getSubmissions();
        let newSubs = subs.filter(s => s.id != id);
        saveSubmissions(newSubs);
        renderApp();
    }

    // 管理员修改报名（文本字段）
    function adminUpdateSubmission(id, newData) {
        let subs = getSubmissions();
        let idx = subs.findIndex(s => s.id == id);
        if(idx !== -1) {
            subs[idx] = { ...subs[idx], ...newData };
            saveSubmissions(subs);
            renderApp();
        }
    }

    // 提交报名 (普通用户) - 无需审核，直接添加
    function submitProgram(data) {
        let subs = getSubmissions();
        let newId = Date.now() + Math.floor(Math.random()*10000);
        let newSubmission = {
            id: newId,
            userPhone: currentUser.phone,
            performers: data.performers,
            programName: data.programName,
            programType: data.programType,
            musicName: data.musicName,
            audioBase64: data.audioBase64 || '',
            audioName: data.audioName || '',
            createdAt: new Date().toISOString()
        };
        subs.push(newSubmission);
        saveSubmissions(subs);
        return true;
    }

    // 渲染主界面 (根据currentUser)
    function renderApp() {
        const container = document.getElementById('appMainContent');
        if(!currentUser) {
            // 未登录 显示报名页面（但表单禁用，提示登录）
            container.innerHTML = renderPublicFormPage();
            attachPublicFormEvents();
        } else if(currentUser.role === 'admin') {
            container.innerHTML = renderAdminPanel();
            attachAdminEvents();
        } else if(currentUser.role === 'user') {
            container.innerHTML = renderUserPanel();
            attachUserEvents();
        }
        updateUserStatusUI();
    }

    // 公共未登录表单（不可提交）
    function renderPublicFormPage() {
        return `
            <div class="declaration" style="background:#ffe0b3;">⚠️ 请先登录/注册账号后即可参与节目报名！点击右上角登录</div>
            <div class="form-card">
                <h3>🎤 节目报名表 (登录后可用)</h3>
                <div class="form-row"><div class="form-group"><label>参演人姓名(全部)</label><input type="text" id="performers" placeholder="例: 张三、李四" disabled></div>
                <div class="form-group"><label>节目名称</label><input type="text" id="programName" placeholder="节目名" disabled></div></div>
                <div class="form-row"><div class="form-group"><label>节目类型</label><input type="text" id="programType" placeholder="歌曲/舞蹈/小品" disabled></div>
                <div class="form-group"><label>音乐/背景音乐歌曲名</label><input type="text" id="musicName" placeholder="歌曲名" disabled></div></div>
                <div class="form-group"><label>上传音频文件</label><input type="file" id="audioFile" accept="audio/*" disabled></div>
                <button disabled style="background:#ccc;">请登录后提交</button>
            </div>
            <div style="text-align:center; padding:20px;">🎈 登录后即可报名并查看自己的节目 🎈</div>
        `;
    }

    function renderUserPanel() {
        let mySubs = getSubmissions().filter(s => s.userPhone === currentUser.phone);
        let subsHtml = mySubs.map(sub => `
            <tr>
                <td>${escapeHtml(sub.performers)}</td>
                <td>${escapeHtml(sub.programName)}</td>
                <td>${escapeHtml(sub.programType)}</td>
                <td>${escapeHtml(sub.musicName)}</td>
                <td>${sub.audioName ? sub.audioName : '无音频'}</td>
                <td><button class="small-btn btn-danger" data-id="${sub.id}" id="delMyBtn_${sub.id}">删除</button></td>
            </tr>
        `).join('');
        if(mySubs.length===0) subsHtml = '<tr><td colspan="6">暂无报名记录，快来提交吧～</td></tr>';
        return `
            <div class="declaration">📢 声明：报名由学生本人自愿填写，如经发现某位同学私自帮其他同学报名，一经发现，严肃处理！</div>
            <div class="form-card">
                <h3>✨ 提交你的六一节目 ✨</h3>
                <div class="form-row"><div class="form-group"><label>参演人姓名(全部) *</label><input type="text" id="performers" placeholder="例: 王小明, 李小萌"></div>
                <div class="form-group"><label>节目名称 *</label><input type="text" id="programName" placeholder="节目名称"></div></div>
                <div class="form-row"><div class="form-group"><label>节目类型 *</label><input type="text" id="programType" placeholder="歌曲/舞蹈/朗诵/小品"></div>
                <div class="form-group"><label>背景音乐歌曲名 *</label><input type="text" id="musicName" placeholder="歌曲名"></div></div>
                <div class="form-group"><label>上传音频文件 (可选)</label><input type="file" id="audioFile" accept="audio/*"></div>
                <button id="submitBtnUser">🎉 提交报名 🎉</button>
            </div>
            <h3>📋 我的报名列表</h3>
            <table class="data-table"><thead><tr><th>参演人</th><th>节目名称</th><th>类型</th><th>音乐名</th><th>音频文件</th><th>操作</th></tr></thead><tbody>${subsHtml}</tbody></table>
        `;
    }

    function attachUserEvents() {
        document.getElementById('submitBtnUser')?.addEventListener('click', () => {
            let performers = document.getElementById('performers').value.trim();
            let programName = document.getElementById('programName').value.trim();
            let programType = document.getElementById('programType').value.trim();
            let musicName = document.getElementById('musicName').value.trim();
            let audioFile = document.getElementById('audioFile').files[0];
            if(!performers || !programName || !programType || !musicName) {
                alert('请完整填写所有带*的字段（参演人姓名，节目名称，类型，背景音乐歌曲名）');
                return;
            }
            let reader = new FileReader();
            let handleSave = (base64Data, fileName) => {
                let success = submitProgram({
                    performers, programName, programType, musicName,
                    audioBase64: base64Data || '', audioName: fileName || ''
                });
                if(success) {
                    alert('提交成功！节目已同步到管理员页面，可随时修改或删除。');
                    document.getElementById('performers').value = '';
                    document.getElementById('programName').value = '';
                    document.getElementById('programType').value = '';
                    document.getElementById('musicName').value = '';
                    document.getElementById('audioFile').value = '';
                    renderApp();
                }
            };
            if(audioFile) {
                reader.onload = function(e) {
                    handleSave(e.target.result, audioFile.name);
                };
                reader.readAsDataURL(audioFile);
            } else {
                handleSave('', '');
            }
        });
        // 删除自己报名的事件委托
        let btns = document.querySelectorAll('[id^="delMyBtn_"]');
        btns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                let id = parseInt(btn.getAttribute('data-id'));
                if(confirm('确定删除你的这个报名吗？')) deleteMySubmission(id);
            });
        });
    }

    function renderAdminPanel() {
        let submissions = getSubmissions();
        let rows = submissions.map(sub => `
            <tr>
                <td>${escapeHtml(sub.userPhone)}</td>
                <td>${escapeHtml(sub.performers)}</td>
                <td>${escapeHtml(sub.programName)}</td>
                <td>${escapeHtml(sub.programType)}</td>
                <td>${escapeHtml(sub.musicName)}</td>
                <td>${sub.audioName ? sub.audioName.substring(0,15) : '无'}</td>
                <td class="action-btns">
                    <button class="small-btn btn-info" data-id="${sub.id}" id="edit_${sub.id}">修改</button>
                    <button class="small-btn btn-danger" data-id="${sub.id}" id="adminDel_${sub.id}">删除</button>
                </td>
            </tr>
        `).join('');
        if(submissions.length===0) rows = '<tr><td colspan="7">暂无任何报名信息</td></tr>';
        return `
            <h2>🔧 管理员控制台 · 所有报名信息</h2>
            <div style="margin:20px 0; display:flex; gap:16px; flex-wrap:wrap;">
                <button id="exportDataBtn" class="btn-success">📎 导出全部资料(表格+音频ZIP)</button>
                <button id="refreshAdminBtn" class="btn-info">🔄 刷新</button>
            </div>
            <table class="data-table"><thead><tr><th>报名人手机</th><th>参演人姓名</th><th>节目名称</th><th>类型</th><th>音乐名</th><th>音频文件</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table>
            <div style="position:fixed; bottom:30px; right:30px; z-index:1000;">
                <button id="accountQueryBtn" style="background:#2c3e50; border-radius:50px; padding:12px 24px;">🔍 登录查询(账号管理)</button>
            </div>
        `;
    }

    function attachAdminEvents() {
        document.getElementById('exportDataBtn')?.addEventListener('click', exportAllData);
        document.getElementById('refreshAdminBtn')?.addEventListener('click', ()=>renderApp());
        document.getElementById('accountQueryBtn')?.addEventListener('click', showAccountManageModal);
        let submissions = getSubmissions();
        submissions.forEach(sub => {
            let delBtn = document.getElementById(`adminDel_${sub.id}`);
            if(delBtn) delBtn.onclick = () => { if(confirm('永久删除该报名？')) adminDeleteSubmission(sub.id); };
            let editBtn = document.getElementById(`edit_${sub.id}`);
            if(editBtn) editBtn.onclick = () => { openEditModal(sub); };
        });
    }

    function openEditModal(sub) {
        document.getElementById('editId').value = sub.id;
        document.getElementById('editPerformers').value = sub.performers;
        document.getElementById('editProgramName').value = sub.programName;
        document.getElementById('editProgramType').value = sub.programType;
        document.getElementById('editMusicName').value = sub.musicName;
        let modal = document.getElementById('editSubmissionModal');
        modal.style.display = 'flex';
        document.getElementById('saveEditBtn').onclick = () => {
            let newData = {
                performers: document.getElementById('editPerformers').value,
                programName: document.getElementById('editProgramName').value,
                programType: document.getElementById('editProgramType').value,
                musicName: document.getElementById('editMusicName').value
            };
            adminUpdateSubmission(sub.id, newData);
            modal.style.display = 'none';
        };
    }

    async function exportAllData() {
        let subs = getSubmissions();
        if(subs.length===0) { alert('暂无数据可导出'); return; }
        let zip = new JSZip();
        let csvRows = [["报名人手机","参演人姓名","节目名称","节目类型","音乐歌曲名","提交时间"]];
        for(let s of subs) {
            csvRows.push([s.userPhone, s.performers, s.programName, s.programType, s.musicName, s.createdAt]);
            if(s.audioBase64 && s.audioName) {
                let base64Data = s.audioBase64.split(',')[1];
                if(base64Data) {
                    let binary = atob(base64Data);
                    let array = new Uint8Array(binary.length);
                    for(let i=0;i<binary.length;i++) array[i]=binary.charCodeAt(i);
                    zip.file(`音频_${s.id}_${s.audioName}`, array);
                }
            }
        }
        let csvContent = csvRows.map(row => row.map(cell => `"${cell}"`).join(",")).join("\n");
        zip.file("报名汇总表.csv", "\uFEFF" + csvContent);
        let blob = await zip.generateAsync({type:"blob"});
        saveAs(blob, "六一节目报名资料.zip");
        alert("导出成功！ZIP包含CSV表格及所有音频文件");
    }

    function showAccountManageModal() {
        let users = getUsers();
        let html = `<table class="data-table"><tr><th>手机号</th><th>密码</th><th>操作</th></tr>`;
        users.forEach(user => {
            html += `<tr><td>${user.phone}</td><td>${user.password}</td><td><button class="small-btn" data-phone="${user.phone}" id="resetPwd_${user.phone}">重置密码为123456</button></td></tr>`;
        });
        html += `</table>`;
        document.getElementById('accountListDiv').innerHTML = html;
        document.getElementById('accountManageModal').style.display = 'flex';
        users.forEach(user => {
            let btn = document.getElementById(`resetPwd_${user.phone}`);
            if(btn) btn.onclick = () => {
                let usersArr = getUsers();
                let target = usersArr.find(u=>u.phone===user.phone);
                if(target) target.password = "123456";
                saveUsers(usersArr);
                alert(`用户 ${user.phone} 密码已重置为123456`);
                showAccountManageModal();
            };
        });
    }

    function updateUserStatusUI() {
        let btnDiv = document.getElementById('userStatusBtn');
        if(!currentUser) {
            btnDiv.innerHTML = `🔑 登录/注册`;
        } else {
            let masked = currentUser.phone.slice(0,3) + '****' + currentUser.phone.slice(-4);
            btnDiv.innerHTML = `👤 ${masked} ▼`;
        }
    }

    function attachPublicFormEvents() { /* 无实际提交 */ }

    // 模态框登录逻辑
    function initLoginModal() {
        let modal = document.getElementById('loginModal');
        let close = document.getElementById('closeLoginModal');
        let userBtn = document.getElementById('userStatusBtn');
        userBtn.onclick = () => { if(currentUser) { showSwitchMenu(); } else { modal.style.display='flex'; } };
        close.onclick = () => modal.style.display='none';
        document.getElementById('doLoginBtn').onclick = () => {
            let phone = document.getElementById('loginPhone').value;
            let pwd = document.getElementById('loginPassword').value;
            let res = loginUser(phone, pwd);
            if(res.success) {
                alert(`登录成功！欢迎${res.role==='admin'?'管理员':phone}`);
                modal.style.display='none';
                renderApp();
            } else alert('账号或密码错误！');
        };
        document.getElementById('toRegisterBtn').onclick = () => {
            document.getElementById('loginTab').style.display='none';
            document.getElementById('registerTab').style.display='block';
        };
        document.getElementById('doRegisterBtn').onclick = () => {
            let phone = document.getElementById('regPhone').value;
            let pwd = document.getElementById('regPassword').value;
            if(!phone.match(/^1[0-9]{10}$/)) { alert('请输入正确手机号'); return; }
            if(pwd.length<3) { alert('密码至少3位'); return; }
            let regRes = registerUser(phone, pwd);
            if(regRes.success) { alert(`注册成功，已自动登录`); modal.style.display='none'; renderApp(); }
            else alert(regRes.msg);
        };
        document.getElementById('backToLoginBtn').onclick = () => {
            document.getElementById('loginTab').style.display='block';
            document.getElementById('registerTab').style.display='none';
        };
        // 切换账号/退出
        window.showSwitchMenu = function() {
            let action = confirm(`当前账号:${currentUser.phone}\n点击确定切换账号，取消退出登录`);
            if(action) { logout(); modal.style.display='flex'; }
            else { logout(); }
        };
        // 管理员其他模态框关闭
        document.getElementById('closeEditModal')?.addEventListener('click',()=>document.getElementById('editSubmissionModal').style.display='none');
        document.getElementById('closeAccountModal')?.addEventListener('click',()=>document.getElementById('accountManageModal').style.display='none');
        window.onclick = function(e) {
            if(e.target.classList.contains('modal')) e.target.style.display='none';
        };
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    initData();
    // 初始启动纸屑（未登录状态，密集）
    startConfetti();
    initLoginModal();
    renderApp();
</script>
</body>
</html>
